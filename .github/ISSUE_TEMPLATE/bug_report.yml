name: Bug report
description: Something is broken or wrong.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please **never paste raw passwords, cookies, or
        Local State files** — redact them first.

  - type: input
    id: version
    attributes:
      label: arc-exporter version
      description: Output of `arc-exporter --version`.
      placeholder: "0.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS 14 (Sonoma)
        - macOS 13 (Ventura)
        - macOS 15 (Sequoia)
        - Windows 11
        - Windows 10
        - Linux
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Exact command (with --verbose)
      render: shell
      placeholder: |
        arc-exporter export bookmarks --verbose
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Output / traceback
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
